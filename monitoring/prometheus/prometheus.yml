global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: sar-backend
    metrics_path: /metrics
    static_configs:
      - targets: ["backend:8000"]

  - job_name: sar-health
    metrics_path: /health
    static_configs:
      - targets: ["backend:8000"]
