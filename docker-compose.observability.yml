services:
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: sar-prometheus
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    networks:
      - sar_network

  alertmanager:
    image: prom/alertmanager:v0.28.0
    container_name: sar-alertmanager
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    ports:
      - "9093:9093"
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
    networks:
      - sar_network

  loki:
    image: grafana/loki:3.0.0
    container_name: sar-loki
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/config.yml:ro
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/config.yml
    networks:
      - sar_network

  promtail:
    image: grafana/promtail:3.0.0
    container_name: sar-promtail
    volumes:
      - ./monitoring/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
    command: -config.file=/etc/promtail/config.yml
    networks:
      - sar_network

  grafana:
    image: grafana/grafana:11.0.0
    container_name: sar-grafana
    volumes:
      - ./monitoring/grafana/provisioning/datasources/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    networks:
      - sar_network

networks:
  sar_network:
    external: true
