name: CI-CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

concurrency:
  group: sar-cicd-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: sujalsune92

jobs:
  quality:
    name: Lint and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint
        continue-on-error: true
        run: ruff check .

      - name: Test
        run: pytest -q tests

  security_python:
    name: Dependency and SAST Checks
    runs-on: ubuntu-latest
    needs: [quality]
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pip-audit bandit

      - name: Dependency vulnerability scan
        run: pip-audit --strict

      - name: SAST scan
        run: bandit -r backend rag_pipeline scripts -ll

  build_and_push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    needs: [quality, security_python]
    if: github.event_name != 'pull_request'
    outputs:
      backend_image: ${{ steps.images.outputs.backend_image }}
      frontend_image: ${{ steps.images.outputs.frontend_image }}
      backend_digest: ${{ steps.backend_build.outputs.digest }}
      frontend_digest: ${{ steps.frontend_build.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        id: backend_build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/sar-backend:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/sar-backend:latest

      - name: Build and push frontend image
        id: frontend_build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/sar-frontend:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/sar-frontend:latest

      - name: Export image references
        id: images
        run: |
          echo "backend_image=${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/sar-backend:${{ github.sha }}" >> "$GITHUB_OUTPUT"
          echo "frontend_image=${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/sar-frontend:${{ github.sha }}" >> "$GITHUB_OUTPUT"

  image_security:
    name: Container Vulnerability Scan
    runs-on: ubuntu-latest
    needs: [build_and_push]
    continue-on-error: true

    steps:
      - name: Scan backend image
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ needs.build_and_push.outputs.backend_image }}
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH

      - name: Scan frontend image
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ needs.build_and_push.outputs.frontend_image }}
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH

  attest_provenance:
    name: Signed Provenance Attestation
    runs-on: ubuntu-latest
    needs: [build_and_push]

    steps:
      - name: Attest backend image provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/sar-backend
          subject-digest: ${{ needs.build_and_push.outputs.backend_digest }}
          push-to-registry: true

      - name: Attest frontend image provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/sar-frontend
          subject-digest: ${{ needs.build_and_push.outputs.frontend_digest }}
          push-to-registry: true

  deploy_staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build_and_push, image_security, attest_provenance]
    if: github.ref == 'refs/heads/main'
    environment:
      name: staging
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure kubectl
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBE_CONFIG_STAGING_B64 }}" | base64 -d > "$HOME/.kube/config"

      - name: Deploy to staging cluster
        env:
          BACKEND_IMAGE: ${{ needs.build_and_push.outputs.backend_image }}
          FRONTEND_IMAGE: ${{ needs.build_and_push.outputs.frontend_image }}
        run: |
          chmod +x scripts/deploy_k8s.sh
          ./scripts/deploy_k8s.sh staging "$BACKEND_IMAGE" "$FRONTEND_IMAGE"

      - name: Auto rollback on staging failure
        if: failure()
        run: |
          chmod +x scripts/rollback_k8s.sh
          ./scripts/rollback_k8s.sh staging

      - name: Notify staging failure
        if: failure() && env.SLACK_WEBHOOK_URL != ''
        run: |
          curl -X POST -H 'Content-type: application/json' --data '{"text":"SAR staging deployment failed for '${{ github.sha }}'. Rollback attempted."}' "$SLACK_WEBHOOK_URL"

  deploy_production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [deploy_staging, build_and_push, image_security, attest_provenance]
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure kubectl
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBE_CONFIG_PRODUCTION_B64 }}" | base64 -d > "$HOME/.kube/config"

      - name: Deploy to production cluster
        env:
          BACKEND_IMAGE: ${{ needs.build_and_push.outputs.backend_image }}
          FRONTEND_IMAGE: ${{ needs.build_and_push.outputs.frontend_image }}
        run: |
          chmod +x scripts/deploy_k8s.sh
          ./scripts/deploy_k8s.sh production "$BACKEND_IMAGE" "$FRONTEND_IMAGE"

      - name: Auto rollback on production failure
        if: failure()
        run: |
          chmod +x scripts/rollback_k8s.sh
          ./scripts/rollback_k8s.sh production

      - name: Notify production failure
        if: failure() && env.SLACK_WEBHOOK_URL != ''
        run: |
          curl -X POST -H 'Content-type: application/json' --data '{"text":"SAR production deployment failed for '${{ github.sha }}'. Rollback attempted."}' "$SLACK_WEBHOOK_URL"

      - name: Notify production success
        if: success() && env.SLACK_WEBHOOK_URL != ''
        run: |
          curl -X POST -H 'Content-type: application/json' --data '{"text":"SAR production deployment succeeded for '${{ github.sha }}'."}' "$SLACK_WEBHOOK_URL"
