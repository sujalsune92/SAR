apiVersion: apps/v1
kind: Deployment
metadata:
  name: sar-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sar-backend
  template:
    metadata:
      labels:
        app: sar-backend
    spec:
      containers:
        - name: backend
          image: sar-backend
          imagePullPolicy: Always
          command: ["/bin/sh", "-c"]
          args:
            - >-
              sed -i 's/Instrumentator().instrument(app).expose(app)/pass/' /app/backend/app.py;
              exec uvicorn backend.app:app --host 0.0.0.0 --port 8000
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: sar-config
            - secretRef:
                name: sar-secrets
          volumeMounts:
            - name: chroma-data
              mountPath: /app/rag_pipeline/vector_db
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 40
            periodSeconds: 20
          resources:
            requests:
              cpu: 300m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 2Gi
      volumes:
        - name: chroma-data
          persistentVolumeClaim:
            claimName: chroma-pvc
