apiVersion: apps/v1
kind: Deployment
metadata:
  name: sar-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sar-frontend
  template:
    metadata:
      labels:
        app: sar-frontend
    spec:
      containers:
        - name: frontend
          image: sar-frontend
          imagePullPolicy: Always
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          command: ["/bin/sh", "-c"]
          args:
            - >-
              sed -i "s|http://backend:8000|http://sar-backend.${POD_NAMESPACE}.svc.cluster.local:8000|g" /etc/nginx/conf.d/default.conf;
              exec nginx -g 'daemon off;'
          ports:
            - containerPort: 80
              name: http
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
