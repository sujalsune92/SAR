apiVersion: apps/v1
kind: Deployment
metadata:
  name: sar-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sar-frontend
  template:
    metadata:
      labels:
        app: sar-frontend
    spec:
      containers:
        - name: frontend
          image: sar-frontend
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              name: http
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
