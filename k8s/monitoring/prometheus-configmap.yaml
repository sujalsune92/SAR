apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config

data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
    rule_files:
      - /etc/prometheus/alerts.yml
    alerting:
      alertmanagers:
        - static_configs:
            - targets: ["alertmanager:9093"]
    scrape_configs:
      - job_name: sar-backend-staging
        metrics_path: /metrics
        static_configs:
          - targets: ["sar-backend.sar-staging.svc.cluster.local:8000"]
      - job_name: sar-backend-production
        metrics_path: /metrics
        static_configs:
          - targets: ["sar-backend.sar-production.svc.cluster.local:8000"]
  alerts.yml: |
    groups:
      - name: sar-cluster-alerts
        rules:
          - alert: SarBackendStagingDown
            expr: up{job="sar-backend-staging"} == 0
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "SAR staging backend is down"
              description: "Cannot scrape staging metrics endpoint for 2 minutes."
          - alert: SarBackendProductionDown
            expr: up{job="sar-backend-production"} == 0
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "SAR production backend is down"
              description: "Cannot scrape production metrics endpoint for 2 minutes."
